<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dwheel 下载管理</title>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --primary: #6366f1; --primary-hover: #4f46e5; --danger: #ef4444; --success: #10b981; --bg: #f1f5f9; --card: #fff; --border: #e2e8f0; --text: #1e293b; --muted: #94a3b8; --radius: 10px; }

body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

/* Login */
.login-page { display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; gap: 1rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
.login-box { background: var(--card); padding: 2.5rem 2rem; border-radius: var(--radius); width: 380px; box-shadow: 0 4px 24px rgba(0,0,0,.12); }
.login-box h1 { margin-bottom: 1.5rem; font-size: 1.5rem; text-align: center; color: var(--primary); font-weight: 700; }
.login-box input { width: 100%; padding: 12px 14px; margin-bottom: 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; background: var(--bg); color: var(--text); transition: border-color .2s, box-shadow .2s; }
.login-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,.15); }
.login-box button { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--primary), var(--primary-hover)); color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: 600; transition: opacity .2s, transform .1s; }
.login-box button:hover { opacity: .9; }
.login-box button:active { transform: scale(.98); }
.login-box .error { color: var(--danger); font-size: 13px; margin-top: 8px; text-align: center; }

/* Layout */
.layout { display: flex; min-height: 100vh; }
.sidebar { width: 220px; background: var(--card); border-right: 1px solid var(--border); padding: 1.25rem 0 1rem 0; display: flex; flex-direction: column; z-index: 10; transition: transform .25s; }
.sidebar h2 { font-size: 1.1rem; margin-bottom: 1.25rem; padding: 0 1.25rem; color: var(--primary); font-weight: 800; letter-spacing: -.5px; }
.sidebar a { display: block; padding: 9px 1.25rem; margin: 2px .75rem; border-radius: 8px; color: var(--text); text-decoration: none; font-size: 14px; cursor: pointer; transition: background .15s, color .15s; }
.sidebar a:hover { background: #f1f5ff; color: var(--primary); }
.sidebar a.active { background: #eef2ff; color: var(--primary); font-weight: 600; }
.sidebar .logout { margin-top: auto; color: var(--danger); }
.sidebar .logout:hover { background: #fef2f2; }

/* Mobile sidebar toggle */
.sidebar-toggle { display: none; position: fixed; top: 12px; left: 12px; z-index: 20; width: 40px; height: 40px; border-radius: 8px; background: var(--card); border: 1px solid var(--border); font-size: 18px; cursor: pointer; align-items: center; justify-content: center; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 9; }

.main { flex: 1; padding: 1.5rem; max-width: 1024px; overflow-x: hidden; }

.page-title { font-size: 1.35rem; font-weight: 700; margin-bottom: 1rem; color: var(--text); letter-spacing: -.3px; }

/* Cards */
.card { background: var(--card); border-radius: var(--radius); padding: 1.1rem 1.35rem; margin-bottom: .85rem; border: 1px solid var(--border); box-shadow: 0 1px 3px rgba(0,0,0,.04); transition: box-shadow .2s; }
.card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.06); }
.card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: .85rem; margin-bottom: 1rem; }
.stat-card { background: var(--card); border-radius: var(--radius); padding: 1.25rem 1rem; text-align: center; border: 1px solid var(--border); box-shadow: 0 1px 3px rgba(0,0,0,.04); transition: transform .15s; }
.stat-card:hover { transform: translateY(-2px); }
.stat-card .num { font-size: 2rem; font-weight: 800; color: var(--primary); line-height: 1.2; }
.stat-card .label { font-size: 12px; color: var(--muted); margin-top: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: .5px; }

/* Tables */
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { text-align: left; padding: 9px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
th { color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; background: #f8fafc; }
tr { transition: background .1s; }
tr:hover { background: #f8fafc; }

/* Badges */
.badge { display: inline-block; padding: 2px 8px; border-radius: 100px; font-size: 11px; font-weight: 600; }
.badge-green { background: #d1fae5; color: #065f46; }
.badge-yellow { background: #fef3c7; color: #92400e; }
.badge-red { background: #fee2e2; color: #991b1b; }
.badge-blue { background: #dbeafe; color: #1e40af; }

/* Buttons */
.btn { display: inline-flex; align-items: center; justify-content: center; padding: 9px 18px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; font-weight: 600; transition: all .15s; gap: 6px; }
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); box-shadow: 0 2px 8px rgba(99,102,241,.3); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #dc2626; box-shadow: 0 2px 8px rgba(239,68,68,.3); }
.btn-default { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
.btn-default:hover { background: var(--border); }
.btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 6px; }

/* Utility */
.mr-2 { margin-right: 8px; }
.mt-2 { margin-top: 8px; }
.mb-2 { margin-bottom: 8px; }
.flex { display: flex; }
.gap-2 { gap: 8px; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.text-muted { color: var(--muted); font-size: 13px; }

/* Progress */
.progress-bar { height: 20px; background: var(--bg); border-radius: 100px; overflow: hidden; position: relative; margin: 8px 0; }
.progress-bar .fill { height: 100%; background: linear-gradient(90deg, var(--primary), #818cf8); border-radius: 100px; transition: width .6s ease; }
.progress-bar .text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; font-weight: 600; text-shadow: 0 1px 2px rgba(0,0,0,.2); }

/* Form */
select, input[type="text"], input[type="number"] { border: 1.5px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); padding: 9px 12px; font-size: 14px; outline: none; transition: border-color .2s, box-shadow .2s; }
select:focus, input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,.12); }
textarea { border: 1.5px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); padding: 12px; font-size: 13px; font-family: 'SF Mono', 'Fira Code', monospace; width: 100%; min-height: 100px; outline: none; transition: border-color .2s, box-shadow .2s; resize: vertical; }
textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,.12); }

/* Toast */
.floating { position: fixed; bottom: 24px; right: 24px; z-index: 100; }
.toast { background: var(--text); color: #fff; padding: 10px 16px; border-radius: 8px; margin-top: 8px; box-shadow: 0 4px 16px rgba(0,0,0,.15); animation: toastIn .25s ease; font-size: 13px; cursor: pointer; }
@keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* Loading spinner */
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Fade transition for page sections */
.main > div { animation: fadeIn .2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

/* Responsive */
@media (max-width: 768px) {
  .sidebar-toggle { display: flex; }
  .sidebar { position: fixed; top: 0; left: 0; height: 100vh; transform: translateX(-100%); width: 240px; }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.open { display: block; }
  .main { padding: 1rem; max-width: 100%; }
  .card { padding: .9rem 1rem; }
  .card-grid { grid-template-columns: repeat(2, 1fr); gap: .5rem; }
  .stat-card .num { font-size: 1.5rem; }
  .login-box { width: calc(100vw - 2rem); max-width: 380px; }
  table { font-size: 12px; }
  th, td { padding: 6px 8px; }
}
</style>
</head>
<body>
<div x-data="app()">
  <!-- Login -->
  <div x-show="!token" class="login-page">
    <div class="login-box">
      <h1>dwheel</h1>
      <input type="text" x-model="username" placeholder="用户名" @keyup.enter="login()">
      <input type="password" x-model="password" placeholder="密码" @keyup.enter="login()">
      <button @click="login()">登录</button>
      <div class="error" x-show="error" x-text="error"></div>
    </div>
  </div>

  <!-- Main App -->
  <div x-show="token" class="layout">
    <button class="sidebar-toggle" @click="sidebarOpen = !sidebarOpen" x-show="token" :class="{ open: sidebarOpen }">☰</button>
    <div class="sidebar-overlay" @click="sidebarOpen = false" :class="{ open: sidebarOpen }"></div>
    <div class="sidebar" :class="{ open: sidebarOpen }">
      <h2>dwheel</h2>
      <a :class="{active: page==='dashboard'}" @click="navTo('dashboard')">概览</a>
      <a :class="{active: page==='agents'}" @click="navTo('agents')">机器管理</a>
      <a :class="{active: page==='jobs'}" @click="navTo('jobs')">下载作业</a>
      <a :class="{active: page==='import'}" @click="navTo('import')">导入</a>
      <a :class="{active: page==='queue'}" @click="navTo('queue'); loadPendingTasks()">任务队列</a>
      <a :class="{active: page==='monitor'}" @click="navTo('monitor'); loadMonitor()">监控</a>
      <a :class="{active: page==='settings'}" @click="navTo('settings')">设置</a>
      <a class="logout" @click="logout()">退出</a>
    </div>
    <div class="main">
      <!-- Dashboard -->
      <div x-show="page==='dashboard'">
        <h2 class="page-title">概览</h2>
        <div class="card-grid">
          <div class="stat-card"><div class="num" x-text="dashboard.agents">0</div><div class="label">机器数</div></div>
          <div class="stat-card"><div class="num" x-text="dashboard.online">0</div><div class="label">在线</div></div>
          <div class="stat-card"><div class="num" x-text="dashboard.jobs_running">0</div><div class="label">运行中</div></div>
          <div class="stat-card"><div class="num" x-text="dashboard.jobs_completed">0</div><div class="label">已完成</div></div>
        </div>
        <div class="card" x-show="dashboard.disk_warnings && dashboard.disk_warnings.length" style="background:#fef2f2;border-color:#fecaca">
          <h4 style="color:#dc2626;margin-bottom:4px">磁盘容量告警</h4>
          <template x-for="w in dashboard.disk_warnings" :key="w.label">
            <div style="font-size:13px;color:#991b1b">
              <span x-text="w.agent_name+': '+w.label"></span>
              <span style="margin-left:8px" x-text="'剩余 '+w.free_gb+'GB ('+w.pct+'% 已用)'"></span>
            </div>
          </template>
        </div>
      </div>

      <!-- Agent Management -->
      <div x-show="page==='agents'">
        <div class="flex justify-between items-center mb-2">
          <h2 class="page-title" style="margin-bottom:0">机器管理</h2>
          <button class="btn btn-primary" @click="showAddAgent=true">+ 添加机器</button>
        </div>

        <div class="card" x-show="showAddAgent">
          <h3 class="mb-2">添加机器</h3>
          <div class="flex gap-2 items-center" style="flex-wrap:wrap">
            <input type="text" x-model="newAgent.name" placeholder="名称" style="width:150px">
            <input type="text" x-model="newAgent.host" placeholder="IP 地址" style="width:150px">
            <input type="number" x-model="newAgent.port" placeholder="端口" style="width:80px">
            <input type="text" x-model="newAgent.api_key" placeholder="API Key" style="width:180px">
            <button class="btn btn-primary btn-sm" @click="addAgent()">保存</button>
            <button class="btn btn-sm" style="background:#475569;color:#e2e8f0" @click="showAddAgent=false">取消</button>
          </div>
        </div>

        <div class="card" x-show="agents.length===0">
          <div class="text-muted">暂无机器</div>
        </div>
        <template x-for="a in agents" :key="a.id">
          <div class="card">
            <div class="flex justify-between items-center">
              <div>
                <strong x-text="a.name"></strong>
                <span class="text-muted" style="margin-left:8px" x-text="a.host+':'+a.port"></span>
                <span :class="'badge '+(a.is_online?'badge-green':'badge-red')" x-text="a.is_online?'在线':'离线'" style="margin-left:8px"></span>
              </div>
              <div class="flex gap-2">
                <button class="btn btn-sm" style="background:#475569;color:#e2e8f0" @click="pingAgent(a.id)">检测</button>
                <button class="btn btn-sm btn-danger" @click="deleteAgent(a.id)">删除</button>
              </div>
            </div>
            <div x-show="a.disks && a.disks.length" class="mt-2">
              <div class="text-muted" style="font-size:12px;margin-bottom:4px">磁盘:</div>
              <template x-for="d in a.disks" :key="d.id">
                <div style="font-size:13px;padding:2px 0">
                  <span x-text="d.label || d.path"></span>
                  <span class="text-muted" style="margin-left:8px" x-text="(d.free_bytes/1024/1024/1024).toFixed(1)+' GB / '+(d.total_bytes/1024/1024/1024).toFixed(1)+' GB'"></span>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>

      <!-- Jobs -->
      <div x-show="page==='jobs'">
        <h2 class="page-title">下载作业</h2>
        <div x-show="!selectedJob">
          <div class="card" x-show="jobs.length===0"><div class="text-muted">暂无作业</div></div>
          <template x-for="j in jobs" :key="j.id">
            <div class="card" style="cursor:pointer" @click="viewJob(j.id)">
              <div class="flex justify-between items-center">
                <div>
                  <strong x-text="j.name || 'job_'+j.id"></strong>
                  <span :class="'badge '+(j.status==='running'?'badge-yellow':j.status==='completed'?'badge-green':j.status==='pending'?'badge-blue':'badge-blue')" style="margin-left:8px" x-text="j.status"></span>
                </div>
                <div class="flex gap-2 items-center">
                  <button class="btn btn-sm btn-primary" @click.stop="startJob(j.id)" x-show="j.status==='pending'">启动</button>
                  <button class="btn btn-sm btn-danger" @click.stop="deleteJob(j.id)">删除</button>
                  <div class="text-muted" x-text="new Date(j.created_at).toLocaleString()"></div>
                </div>
              </div>
              <div class="flex gap-2 mt-2 text-muted" style="font-size:13px">
                <span x-text="'共 '+j.total_episodes+' 个文件'"></span>
                <span x-show="j.completed>0" x-text="'已完成 '+j.completed"></span>
                <span x-show="j.failed>0" style="color:#ef4444" x-text="'失败 '+j.failed"></span>
              </div>
            </div>
          </template>
        </div>
        <!-- Job Detail -->
        <template x-if="selectedJob">
        <div>
          <button class="btn btn-sm" style="background:#475569;color:#e2e8f0;margin-bottom:12px" @click="selectedJob=null">← 返回</button>
          <div class="card">
            <div class="flex justify-between items-center">
              <h3 x-text="selectedJob.name"></h3>
              <div>
                <button class="btn btn-sm btn-primary" @click="startJob(selectedJob.id); selectedJob.status='running'" x-show="selectedJob.status==='pending'">启动</button>
                <button class="btn btn-sm btn-danger" @click="stopJob(selectedJob.id)" x-show="selectedJob.status==='running'">停止</button>
              </div>
            </div>
            <div class="mt-2">
              <div class="progress-bar">
                <div class="fill" :style="'width:'+(selectedJob.total_episodes?((selectedJob.completed+selectedJob.failed)/selectedJob.total_episodes*100)+'%':'0%')"></div>
                <div class="text" x-text="selectedJob.completed+' / '+selectedJob.total_episodes"></div>
              </div>
            </div>
            <div class="flex gap-2 mt-2 text-muted" style="font-size:13px">
              <span x-text="'已完成: '+selectedJob.completed"></span>
              <span x-show="selectedJob.failed>0" style="color:#ef4444" x-text="'失败: '+selectedJob.failed"></span>
              <span x-show="selectedJob.speed>0" x-text="'速度: '+selectedJob.speed.toFixed(1)+' eps/s'"></span>
              <span x-show="selectedJob.elapsed>0" x-text="'耗时: '+Math.floor(selectedJob.elapsed/60)+'m'+Math.floor(selectedJob.elapsed%60)+'s'"></span>
              <span x-text="'状态: '+selectedJob.status"></span>
            </div>
          </div>

          <!-- 任务级进度 -->
          <div class="card" x-show="selectedJob.task_detail && selectedJob.task_detail.length">
            <h4 class="mb-2">任务进度</h4>
            <template x-for="t in selectedJob.task_detail" :key="t.task_id">
              <div class="mb-2" style="font-size:13px;border-bottom:1px solid #eee;padding-bottom:6px">
                <div class="flex justify-between mb-1">
                  <span style="font-family:monospace;font-size:12px" x-text="t.task_id.slice(0,16)+'...'"></span>
                  <span class="text-muted" x-text="(t.completed||0)+' / '+(t.total||0)"></span>
                  <span style="font-size:12px" x-text="(t.disk||'').split('/').slice(-2).join('/')"></span>
                </div>
                <div class="progress-bar" style="height:12px">
                  <div class="fill" :style="'width:'+(t.total>0?((t.completed+t.failed)/t.total*100):0)+'%'"></div>
                </div>
              </div>
            </template>
          </div>

          <!-- 错误列表 -->
          <div class="card" x-show="selectedJob.errors && selectedJob.errors.length">
            <h4 class="mb-2" style="color:#dc2626">下载失败 (x-text="selectedJob.errors.length">)</h4>
            <div style="max-height:300px;overflow-y:auto;font-size:12px;font-family:monospace">
              <template x-for="(e,i) in selectedJob.errors" :key="i">
                <div style="padding:4px 0;border-bottom:1px solid #f0f0f0">
                  <span x-text="e.episode_id?.slice(0,12)+'...'"></span>
                  <span class="text-muted" style="margin-left:8px" x-text="e.task_id?.slice(0,12)+'...'"></span>
                  <span x-show="e.reason" style="color:#dc2626;margin-left:8px" x-text="e.reason?.slice(0,100)"></span>
                </div>
              </template>
            </div>
          </div>

          <div class="card" x-show="selectedJob.tasks && selectedJob.tasks.length">
            <h4 class="mb-2">任务列表</h4>
            <table>
              <tr><th>Task ID</th><th>磁盘</th><th>文件数</th><th>状态</th></tr>
              <template x-for="t in selectedJob.tasks" :key="t.id">
                <tr>
                  <td x-text="t.task_id?.slice(0,16)+'...'"></td>
                  <td style="font-size:12px" x-text="t.disk_path?.split('/').slice(-2).join('/')"></td>
                  <td x-text="t.selected_episodes"></td>
                  <td><span :class="'badge '+ (t.status==='completed'?'badge-green':'badge-yellow')" x-text="t.status"></span></td>
                </tr>
              </template>
            </table>
          </div>
        </div>
        </template>
      </div>

      <!-- Settings -->
      <div x-show="page==='monitor'">
        <h2 class="page-title">监控面板</h2>

        <div class="card-grid">
          <div class="stat-card"><div class="num" x-text="mon.total_tasks" :style="mon.total_tasks>0?'color:var(--primary)':''">0</div><div class="label">总任务数</div></div>
          <div class="stat-card"><div class="num" x-text="mon.total_files" :style="mon.total_files>0?'color:var(--primary)':''">0</div><div class="label">总文件数</div></div>
          <div class="stat-card"><div class="num" x-text="mon.completed" style="color:var(--success)">0</div><div class="label">已完成</div></div>
          <div class="stat-card"><div class="num" x-text="mon.failed" :style="mon.failed>0?'color:var(--danger)':''">0</div><div class="label">失败</div></div>
          <div class="stat-card"><div class="num" style="font-size:1.4rem" x-text="mon.speed.toFixed(1)+' eps/s'" :style="mon.speed>0?'color:var(--primary)':''">0 eps/s</div><div class="label">下载速度</div></div>
          <div class="stat-card"><div class="num" style="font-size:1.4rem" x-text="mon.eta_text" :style="mon.eta>0?'color:var(--primary)':''">--</div><div class="label">预计剩余</div></div>
        </div>

        <div class="card">
          <div class="progress-bar" style="height:24px">
            <div class="fill" :style="'width:'+(mon.total_files>0?(mon.completed+mon.failed)/mon.total_files*100:0)+'%'"></div>
            <div class="text" x-text="(mon.completed||0)+' / '+(mon.total_files||0)"></div>
          </div>
        </div>

        <div class="card" x-show="mon.disks.length">
          <h3 class="mb-2">磁盘状态</h3>
          <template x-for="d in mon.disks" :key="d.id">
            <div class="mb-2" style="font-size:13px">
              <div class="flex justify-between">
                <span x-text="d.agent_name+': '+d.label" style="font-weight:500"></span>
                <span class="text-muted" x-text="((d.total_bytes-d.free_bytes)/1024/1024/1024).toFixed(1)+' / '+(d.total_bytes/1024/1024/1024).toFixed(1)+' GB'"></span>
              </div>
              <div class="progress-bar" style="height:14px;background:var(--bg)">
                <div class="fill" :style="'width:'+((d.total_bytes-d.free_bytes)/d.total_bytes*100)+'%;background:'+(d.free_bytes/d.total_bytes<.1?'var(--danger)':d.free_bytes/d.total_bytes<.2?'#f59e0b':'var(--primary)')+';border-radius:6px'"></div>
              </div>
            </div>
          </template>
        </div>
      </div>

      <!-- Import (选机器 → 上传 → 提取 → 选择 → 保存到队列) -->
      <div x-show="page==='import'">
        <h2 class="page-title">导入任务</h2>

        <div class="card">
          <h3 class="mb-2">选择机器</h3>
          <select x-model="qi.agent_id">
            <option value="">-- 选择机器 --</option>
            <template x-for="a in agents" :key="a.id">
              <option :value="a.id" x-text="a.name+' ('+a.host+')'"></option>
            </template>
          </select>
        </div>

        <div class="card" x-show="qi.agent_id">
          <h3 class="mb-2">上传表格</h3>
          <p class="text-muted mb-2" style="font-size:13px">上传 xlsx/xls，自动识别 task_id 和时长列</p>
          <input type="file" id="importFile" accept=".xlsx,.xls,.txt,.csv" style="font-size:13px"
                 @change="qiUploadPreview($event)">
        </div>

        <!-- Mapping Panel -->
        <div class="card" x-show="qi.preview_sheets.length && !qi.extracted">
          <div class="flex justify-between items-center mb-2">
            <h3>确认列映射</h3>
            <select x-show="qi.preview_sheets.length>1" x-model="qi.active_sheet" style="width:auto;font-size:13px">
              <template x-for="(s,i) in qi.preview_sheets" :key="i">
                <option :value="i" x-text="s.name+' ('+s.total_rows+'行)'"></option>
              </template>
            </select>
          </div>
          <template x-if="qi.preview_sheets.length">
          <template x-for="s in [qi.preview_sheets[qi.active_sheet]]" :key="qi.active_sheet">
            <div>
              <div class="flex gap-2 mb-2" style="flex-wrap:wrap;align-items:center">
                <span style="font-size:13px">Task ID 列:</span>
                <select :value="qi.mappings[qi.active_sheet]?.task_id_col"
                        @change="qi.mappings[qi.active_sheet].task_id_col = $event.target.value !== '' ? parseInt($event.target.value) : null"
                        style="width:auto;font-size:13px">
                  <option :value="null">-- 选择 --</option>
                  <template x-for="c in s.columns" :key="c.index">
                    <option :value="c.index" x-text="(c.index+1)+'. '+c.header+(c.detected==='task_id'?' ✓':'')" :style="c.detected==='task_id'?'color:var(--primary);font-weight:600':''"></option>
                  </template>
                </select>
                <span style="font-size:13px;margin-left:8px">时长列:</span>
                <select :value="qi.mappings[qi.active_sheet]?.duration_col"
                        @change="qi.mappings[qi.active_sheet].duration_col = $event.target.value !== '' ? parseInt($event.target.value) : null"
                        style="width:auto;font-size:13px">
                  <option :value="null">-- 选择 --</option>
                  <template x-for="c in s.columns" :key="c.index">
                    <option :value="c.index" x-text="(c.index+1)+'. '+c.header+(c.detected==='duration'?' ✓':'')" :style="c.detected==='duration'?'color:var(--primary);font-weight:600':''"></option>
                  </template>
                </select>
              </div>
              <div style="max-height:200px;overflow:auto;font-size:12px" class="table-wrap">
                <table>
                  <tr>
                    <template x-for="c in s.columns" :key="c.index">
                      <th x-text="c.header||'列'+(c.index+1)" :style="c.detected?'color:var(--primary)':''"></th>
                    </template>
                  </tr>
                  <template x-for="row in s.preview_rows" :key="row[0]">
                    <tr>
                      <template x-for="(cell,ci) in s.columns" :key="ci">
                        <td x-text="row[ci]||''" :style="(ci===qi.mappings[qi.active_sheet].task_id_col||ci===qi.mappings[qi.active_sheet].duration_col)?'background:#eef2ff':''"></td>
                      </template>
                    </tr>
                  </template>
                </table>
              </div>
              <div class="flex gap-2 mt-2">
                <button class="btn btn-sm btn-primary" @click="qiDoExtract()">确认提取</button>
                <button class="btn btn-sm" style="background:#475569;color:#e2e8f0" @click="qi.preview_sheets=[]">取消</button>
              </div>
            </div>
          </template>
          </template>
        </div>

        <!-- Extracted task_id selection -->
        <div class="card" x-show="qi.extracted_tasks.length">
          <div class="flex justify-between items-center mb-2">
            <h3>
              <span x-text="'提取 '+qi.extracted_tasks.length+' 个 task_id'"></span>
              <span class="text-muted" style="font-size:12px;margin-left:8px" x-text="' 已选 '+qi.extracted_tasks.filter(t=>t.selected).length"></span>
            </h3>
            <div class="flex gap-2">
              <input type="text" x-model="qi.batch_name" placeholder="批次名称" style="font-size:12px;width:140px;padding:4px 8px">
              <button class="btn btn-sm" style="background:#475569;color:#e2e8f0" @click="qiSelectAll(true)">全选</button>
              <button class="btn btn-sm btn-default" @click="qiSelectAll(false)">清空</button>
            </div>
          </div>
          <div style="max-height:400px;overflow-y:auto;font-size:12px;font-family:monospace;background:#f8fafc;padding:8px;border-radius:6px">
            <template x-for="t in qi.extracted_tasks" :key="t.task_id">
              <label style="display:flex;align-items:center;padding:3px 0;border-bottom:1px solid var(--border);cursor:pointer">
                <input type="checkbox" :checked="t.selected" @change="t.selected = $event.target.checked" style="margin-right:8px">
                <span style="min-width:260px;font-family:monospace" x-text="t.task_id"></span>
                <span class="text-muted" style="margin-left:8px;min-width:50px" x-show="t.episode_count>0" x-text="t.episode_count+' eps'"></span>
                <span class="text-muted" style="margin-left:8px;min-width:70px" x-show="t.size_gb>0" x-text="t.size_gb.toFixed(1)+' GB'"></span>
                <span class="text-muted" style="margin-left:8px" x-show="t.duration_h>0" x-text="t.duration_h+'h'"></span>
              </label>
            </template>
          </div>
          <button class="btn btn-primary mt-2" @click="qiSaveToQueue()" x-text="qi.saving ? '保存中...' : '保存到任务队列'"></button>
        </div>
      </div>

      <!-- Task Queue -->
      <div x-show="page==='queue'">
        <h2 class="page-title">任务队列</h2>

        <div class="flex gap-2 mb-2" style="flex-wrap:wrap;align-items:center">
          <select x-model="pq.status_filter" style="width:auto">
            <option value="">全部状态</option>
            <option value="pending">待处理</option>
            <option value="running">运行中</option>
            <option value="completed">已完成</option>
            <option value="skipped">已跳过</option>
          </select>
          <span class="text-muted" style="font-size:13px" x-text="'共 '+pq.tasks.length+' 条 '+pq.batches.length+' 批'"></span>
          <button class="btn btn-sm" style="background:#475569;color:#e2e8f0;margin-left:auto" @click="pqRefresh()">刷新</button>
        </div>

        <div class="card" x-show="!pq.batches.length"><div class="text-muted">暂无任务</div></div>

        <template x-for="(batch,bidx) in pq.batches" :key="batch.name||bidx">
          <div class="card">
            <div class="flex justify-between items-center mb-2" @click="batch.open = !batch.open" style="cursor:pointer">
              <div>
                <strong x-text="batch.name||'未分组'"></strong>
                <span class="badge badge-blue" style="margin-left:8px" x-text="batch.tasks.length+' 条'"></span>
                <span class="badge" :class="batch.pending?'badge-yellow':'badge-green'" style="margin-left:4px" x-text="batch.pending+' 待处理'" x-show="batch.pending"></span>
                <span class="badge badge-red" style="margin-left:4px" x-show="batch.skipped" x-text="batch.skipped+' 已跳过'"></span>
              </div>
              <div class="flex gap-2">
                <button class="btn btn-sm btn-danger" @click.stop="pqDeleteBatch(batch.name)" x-show="batch.name">删这组</button>
                <span x-text="batch.open ? '▲' : '▼'" style="font-size:12px;color:var(--muted)"></span>
              </div>
            </div>
            <div x-show="batch.open">
              <!-- Create job controls -->
              <div class="flex gap-2 mb-2" style="flex-wrap:wrap;align-items:center" x-show="batch.pending">
                <input type="text" :id="'jobname_'+batch.name" placeholder="作业名称" style="font-size:12px;width:140px;padding:4px 8px">
                <select :id="'disk_'+batch.name" style="font-size:12px;width:auto;padding:4px 8px">
                  <option value="">选择磁盘</option>
                  <template x-for="d in agents[0]?.disks" :key="d.path">
                    <option :value="d.path" x-text="d.label+' ('+(d.free_bytes/1024/1024/1024).toFixed(0)+'GB)'"></option>
                  </template>
                </select>
                <button class="btn btn-sm btn-primary" @click="pqCreateJob(batch)">创建下载</button>
              </div>
              <div class="table-wrap">
              <table>
                <tr>
                  <th>Task ID</th>
                  <th style="text-align:right">文件数</th>
                  <th style="text-align:right">大小</th>
                  <th>状态</th>
                  <th style="text-align:right">操作</th>
                </tr>
                <template x-for="t in batch.tasks" :key="t.id">
                  <tr>
                    <td style="font-family:monospace;font-size:12px" x-text="t.task_id.slice(0,16)+'...'"></td>
                    <td style="text-align:right" x-text="t.episode_count"></td>
                    <td style="text-align:right;font-size:12px" x-text="(t.estimated_bytes/1024/1024/1024).toFixed(2)+' GB'"></td>
                    <td>
                      <span :class="'badge '+(t.status==='completed'?'badge-green':t.status==='running'?'badge-yellow':t.status==='skipped'?'badge-red':'badge-blue')" x-text="t.status"></span>
                    </td>
                    <td style="text-align:right">
                      <button class="btn btn-sm btn-danger" @click="pqDelete(t.id)">删除</button>
                      <button class="btn btn-sm btn-primary" @click="pqRetry(t.id)" x-show="t.status==='skipped'||t.status==='completed'">重试</button>
                    </td>
                  </tr>
                </template>
              </table>
            </div>
          </div>
        </template>
      </div>

      <!-- Allocate -->
      <div x-show="page==='allocate'">
        <h2 class="page-title">分配作业</h2>

        <div class="card">
          <div class="flex gap-2 mb-2" style="flex-wrap:wrap;align-items:center">
            <select x-model="al.agent_id" style="width:auto">
              <option value="">-- 选择机器 --</option>
              <template x-for="a in agents" :key="a.id">
                <option :value="a.id" x-text="a.name+' ('+a.host+')'"></option>
              </template>
            </select>
            <button class="btn btn-sm btn-primary" @click="alLoad()">加载任务</button>
          </div>
        </div>

        <!-- 任务列表 + 手动分配 -->
        <div class="card" x-show="al.all_tasks.length">
          <div class="flex justify-between items-center mb-2">
            <h3 x-text="'待分配 ('+al.all_tasks.filter(t=>!t.disk_path).length+'/'+al.all_tasks.length+')'"></h3>
            <div class="flex gap-2">
              <select x-model="al.assign_disk" style="width:auto;font-size:12px">
                <option value="">-- 分配到磁盘 --</option>
                <template x-for="d in selectedAgentDisks" :key="d.path">
                  <option :value="d.path" x-text="d.label+' 自由 '+(d.free_bytes*0.95/1024/1024/1024).toFixed(0)+'GB'"></option>
                </template>
              </select>
              <button class="btn btn-sm" style="background:#475569;color:#e2e8f0" @click="alManualAssign()">分配并启动</button>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <tr>
                <th style="width:30px"><input type="checkbox" @change="alToggleAll($event)"></th>
                <th>Task ID</th>
                <th style="text-align:right">文件数</th>
                <th style="text-align:right">大小</th>
              </tr>
              <template x-for="t in al.all_tasks" :key="t.id">
                <tr>
                  <td><input type="checkbox" :value="t.id" x-model="al.selected"></td>
                  <td style="font-family:monospace;font-size:12px" x-text="t.task_id.slice(0,16)+'...'"></td>
                  <td style="text-align:right" x-text="t.episode_count"></td>
                  <td style="text-align:right;font-size:12px" x-text="(t.estimated_bytes/1024/1024/1024).toFixed(2)+' GB'"></td>
                </tr>
              </template>
            </table>
          </div>
        </div>

        <div class="card" x-show="al.all_tasks.length===0 && al.agent_id"><div class="text-muted">无待分配任务，请先导入</div></div>
      </div>
      </div>

      <div x-show="page==='settings'">
        <h2 class="page-title">设置</h2>
        <div class="card">
          <h3 class="mb-2">OBS 数据源</h3>
          <div x-show="!showAddObs">
            <button class="btn btn-sm btn-primary" @click="showAddObs=true">+ 添加源</button>
          </div>
            <div x-show="showAddObs" class="flex gap-2 items-center mt-2" style="flex-wrap:wrap">
              <input type="text" x-model="newObs.name" placeholder="名称" style="width:120px">
              <input type="text" x-model="newObs.bucket" placeholder="obs://bucket/prefix" style="width:240px">
              <input type="text" x-model="newObs.audit_bucket" placeholder="审核路径(可选)" style="width:180px">
              <button class="btn btn-sm btn-primary" @click="addObs()">保存</button>
              <button class="btn btn-sm" style="background:#475569;color:#e2e8f0" @click="showAddObs=false">取消</button>
            </div>
            <template x-for="s in obsSources" :key="s.id">
              <div class="mt-2" style="font-size:13px;padding:4px 0;border-bottom:1px solid #eee">
                <strong x-text="s.name"></strong>
                <span class="text-muted" style="margin-left:8px" x-text="s.bucket"></span>
                <span x-show="s.audit_bucket" class="badge badge-blue" style="margin-left:8px" x-text="'审核: '+s.audit_bucket"></span>
              </div>
            </template>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="floating">
    <template x-for="(msg,i) in toasts" :key="i">
      <div class="toast" @click="toasts.splice(i,1)" x-text="msg"></div>
    </template>
  </div>
</div>

<script>
function app() {
  return {
    token: localStorage.getItem('dwheel_token') || '',
    username: '', password: '', error: '',
    page: 'dashboard',
    toasts: [],
    sidebarOpen: false,

    // Dashboard
    dashboard: { agents:0, online:0, jobs_running:0, jobs_completed:0 },
    mon: { logs:[], jobs:[], disks:[], running:0, completed:0, failed:0, total_tasks:0, total_files:0, speed:0, eta:0, eta_text:'--' },

    // Agents
    agents: [],
    showAddAgent: false,
    newAgent: { name:'', host:'', port:8081, api_key:'' },

    // Jobs
    jobs: [],
    selectedJob: null,

    // Create
    create: {},

    // Settings
    obsSources: [],
    showAddObs: false,
    newObs: { name:'', bucket:'', audit_bucket:'' },

    // Import
    importResult: { ids:[], estimates:[], estimating:false, total_episodes:0, total_size:0, total_size_text:'' },

    // Quick Import (新版一键流程)
    qi: { agent_id:'', task_text:'', tasks:[], total_eps:0, total_bytes:0, loading:false, creating:false, durations:{}, overrides:{}, preview_sheets:[], file_key:'', active_sheet:0, mappings:[], extracted:false, extracted_tasks:[], saving:false, estimating:false, total_estimate:0, batch_name:'' },

    // Pending Queue
    pq: { tasks:[], status_filter:'', batches:[] },

    // Allocate
    al: { agent_id:'', plan:[], pending_count:0, unassigned:0, loading:false, all_tasks:[], selected:[], assign_disk:'' },

    init() {
      if (this.token) this.loadDashboard();
      setInterval(() => { this.autoRefreshJob(); }, 500);
      setInterval(() => { if (this.page === 'monitor') this.loadMonitor(); }, 500);
    },

    toast(msg) { this.toasts.push(msg); setTimeout(() => this.toasts.shift(), 3000); },

    navTo(page) { this.page = page; this.sidebarOpen = false; },

    api(path, opts={}) {
      opts.headers = opts.headers || {};
      if (this.token) opts.headers['Authorization'] = 'Bearer '+this.token;
      if (opts.body && typeof opts.body === 'object' && !(opts.body instanceof FormData)) {
        opts.body = JSON.stringify(opts.body);
        opts.headers['Content-Type'] = 'application/json';
      }
      return fetch(path, opts).then(r => {
        if (r.status === 401) { this.token=''; localStorage.removeItem('dwheel_token'); }
        return r.json();
      });
    },

    login() {
      // 用户登录：验证凭证后存储 Token 到 localStorage
      this.api('/api/v1/auth/login', {method:'POST', body:{username:this.username, password:this.password}})
        .then(r => { if (r.ok) { this.token = r.token; localStorage.setItem('dwheel_token', r.token); this.loadDashboard(); this.error=''; } else { this.error = r.error || '登录失败'; }});
    },
    logout() {
      this.token = ''; localStorage.removeItem('dwheel_token'); this.page = 'dashboard';
    },

    loadDashboard() {
      // 加载仪表盘数据（统计/Agent/任务/OBS源/监控）
      this.api('/api/v1/dashboard').then(r => { if (r.ok) this.dashboard = r; });
      this.loadAgents();
      this.loadJobs();
      this.loadPendingTasks();
      this.api('/api/v1/obs-sources').then(r => { if (r.ok) this.obsSources = r.sources; });
      this.loadMonitor();
    },

    // Agents
    loadAgents() { this.api('/api/v1/agents').then(r => { if (r.ok) this.agents = r.agents; }); },
    addAgent() {
      this.api('/api/v1/agents', {method:'POST', body:this.newAgent}).then(r => {
        if (r.ok) { this.toast('机器已添加'); this.showAddAgent = false; this.newAgent = {name:'', host:'', port:8081, api_key:''}; this.loadAgents(); }
        else this.toast('添加失败: '+r.error);
      });
    },
    deleteAgent(id) {
      if (!confirm('确定删除此机器?')) return;
      this.api('/api/v1/agents/'+id, {method:'DELETE'}).then(r => { if (r.ok) { this.toast('已删除'); this.loadAgents(); }});
    },
    pingAgent(id) {
      this.api('/api/v1/agents/'+id+'/ping', {method:'POST'}).then(r => {
        if (r.ok) { this.toast('检测成功: '+(r.agent_status?.ok ? '在线' : '离线')); this.loadAgents(); }
        else this.toast('检测失败');
      });
    },

    // Jobs
    loadJobs() {
      this.api('/api/v1/jobs').then(r => { if (r.ok) this.jobs = r.jobs; });
    },
    startJob(id) {
      this.api('/api/v1/jobs/'+id+'/start', {method:'POST'}).then(r => {
        if (r.ok) { this.toast('作业已启动'); this.loadJobs(); }
        else { this.toast('启动失败: '+r.error); }
      });
    },
    deleteJob(id) {
      if (!confirm('确定删除此作业?')) return;
      this.api('/api/v1/jobs/'+id, {method:'DELETE'}).then(r => {
        if (r.ok) { this.loadJobs(); if (this.selectedJob?.id === id) this.selectedJob = null; }
      });
    },
    viewJob(id) {
      // 查看作业详情（触发自动刷新）
      this.api('/api/v1/jobs/'+id).then(r => { if (r.ok) this.selectedJob = r.job; });
    },
    stopJob(id) {
      // 停止运行中的作业
      this.api('/api/v1/jobs/'+id+'/stop', {method:'POST'}).then(r => { if (r.ok) { this.toast('已停止'); this.loadJobs(); this.selectedJob=null; }});
    },
    autoRefreshJob() {
      if (this.selectedJob && this.selectedJob.status === 'running') {
        this.api('/api/v1/jobs/'+this.selectedJob.id+'/progress').then(r => {
          if (r.ok && this.selectedJob) {
            this.selectedJob.completed = r.completed;
            this.selectedJob.failed = r.failed;
            this.selectedJob.speed = r.speed || 0;
            this.selectedJob.elapsed = r.elapsed || 0;
            if (r.total) this.selectedJob.total_episodes = r.total;
            if (r.tasks) this.selectedJob.task_detail = r.tasks;
            if (r.errors) this.selectedJob.errors = r.errors;
          }
        });
      }
    },

    // Settings
    addObs() {
      // 添加 OBS 数据源配置
      this.api('/api/v1/obs-sources', {method:'POST', body:this.newObs}).then(r => {
        if (r.ok) { this.toast('已添加'); this.showAddObs = false; this.newObs = {name:'', bucket:''}; this.loadDashboard(); }
      });
    },

    // Quick Import (一键导入 + 自动分配 + 下载)
    get qi_parsed() {
      const ids = this.qi.task_text.match(/[0-9a-f]{32}/gi) || [];
      return [...new Set(ids.map(x => x.toLowerCase()))];
    },
    qiUploadPreview(e) {
      const file = e.target.files[0];
      if (!file) return;
      const fd = new FormData();
      fd.append('file', file);
      this.api('/api/v1/import/preview', {method:'POST', body:fd}).then(r => {
        if (r.ok) {
          this.qi.preview_sheets = r.sheets;
          this.qi.file_key = r.file_key;
          this.qi.active_sheet = 0;
          this.qi.mappings = r.sheets.map(s => ({
            task_id_col: s.suggested.task_id_col,
            duration_col: s.suggested.duration_col,
          }));
          this.qi.extracted = false;
        } else {
          this.toast(r.error || '解析失败');
        }
      });
    },
    qiDoExtract() {
      const tasks = [];
      const seen = new Set();
      this.qi.preview_sheets.forEach((s, si) => {
        const tid_col = this.qi.mappings[si]?.task_id_col;
        const dur_col = this.qi.mappings[si]?.duration_col;
        if (tid_col === null || tid_col === undefined) return;
        s.preview_rows.forEach(row => {
          const raw = (row[tid_col] || '').toString().trim().toLowerCase();
          const m = raw.match(/[0-9a-f]{31,32}/i);
          if (m && !seen.has(m[0])) {
            seen.add(m[0]);
            let dur = 0;
            if (dur_col !== null && dur_col !== undefined) {
              const v = parseFloat(row[dur_col]);
              if (!isNaN(v)) dur = v;
            }
            tasks.push({task_id: m[0], duration_h: dur, selected: true});
          }
        });
      });
      if (!tasks.length) { this.toast('未找到有效的 task_id'); return; }
      this.qi.extracted_tasks = tasks;
      this.qi.extracted = true;
      this.qi.preview_sheets = [];
      this.toast('已提取 ' + tasks.length + ' 个 task_id');
    },
    qiSaveToQueue() {
      const selected = this.qi.extracted_tasks.filter(t => t.selected);
      const skipped = this.qi.extracted_tasks.filter(t => !t.selected);
      if (!selected.length && !skipped.length) { this.toast('无 task_id'); return; }
      this.qi.saving = true;
      let done = 0, total = (selected.length > 0) + (skipped.length > 0);
      const check = () => { done++; if (done >= total) { this.qi.saving = false; this.qi.extracted_tasks = []; this.qi.extracted = false; document.getElementById('importFile').value = ''; }};
      if (selected.length) {
        this.api('/api/v1/tasks/prepare', {method:'POST', body:{
          task_ids: selected.map(t => t.task_id), agent_id: parseInt(this.qi.agent_id),
          durations: {}, obs_source_id: this.obsSources[0]?.id || null,
          batch_name: this.qi.batch_name || (new Date().toISOString().slice(0,10) + '_' + selected.length.toString()),
        }}).then(r => {
          if (r.ok) this.toast('已添加 ' + selected.length + ' 个任务（' + r.count + ' 个已发现）');
          check();
        });
      } else check();
      if (skipped.length) {
        this.api('/api/v1/tasks/pending/skip', {method:'POST', body:{
          task_ids: skipped.map(t => t.task_id), agent_id: parseInt(this.qi.agent_id),
          batch_name: this.qi.batch_name || (new Date().toISOString().slice(0,10) + '_' + skipped.length.toString()),
        }}).then(r => {
          if (r.ok) this.toast('已跳过 ' + skipped.length + ' 个');
          check();
        });
      } else check();
    },
    qiSelectAll(v) {
      this.qi.extracted_tasks.forEach(t => { t.selected = v; });
    },
    qiEstimateSizes() {
      const selected = this.qi.extracted_tasks.filter(t => t.selected);
      const ids = selected.length ? selected.map(t => t.task_id) : this.qi.extracted_tasks.map(t => t.task_id);
      if (!ids.length) return;
      this.qi.estimating = true;
      this.api('/api/v1/tasks/info', {method:'POST', body:{task_ids: ids, durations: {}, obs_source_id: this.obsSources[0]?.id || null}}).then(r => {
        this.qi.estimating = false;
        if (r.ok && r.tasks) {
          const map = {};
          r.tasks.forEach(t => { map[t.task_id] = {episode_count: t.episode_count, estimated_bytes: t.estimated_bytes}; });
          this.qi.extracted_tasks.forEach(t => {
            if (map[t.task_id]) {
              t.episode_count = map[t.task_id].episode_count;
              t.size_gb = map[t.task_id].estimated_bytes / 1024 / 1024 / 1024;
            }
          });
          this.qi.total_estimate = r.tasks.reduce((s,t) => s + (t.estimated_bytes||0), 0);
        }
      });
    },
    qiParseFile() {
      const input = document.getElementById('importFile');
      if (!input.files || !input.files[0]) { this.toast('请先选择文件'); return; }
      const file = input.files[0];
      const formData = new FormData();
      formData.append('file', file);
      this.api('/api/v1/import/parse', {method:'POST', body:formData}).then(r => {
        if (r.ok && r.ids.length) {
          this.qi.task_text = r.ids.join('\n');
          this.toast('识别到 ' + r.ids.length + ' 个 task_id');
        } else {
          this.toast(r.error || '未找到 task_id');
        }
      });
    },
    qiPrepare() {
      const ids = this.qi_parsed;
      if (!ids.length) { this.toast('未识别到 task_id'); return; }
      if (!this.qi.agent_id) { this.toast('请先选择机器'); return; }
      this.qi.loading = true; this.qi.tasks = [];
      this.api('/api/v1/tasks/prepare', {method:'POST', body:{
        task_ids: ids, agent_id: parseInt(this.qi.agent_id),
        durations: this.qi.durations, obs_source_id: this.obsSources[0]?.id || null,
      }}).then(r => {
        this.qi.loading = false;
        if (r.ok) {
          this.qi.tasks = r.tasks;
          this.qi.total_eps = r.tasks.reduce((s,t) => s+t.episode_count, 0);
          this.qi.total_bytes = r.tasks.reduce((s,t) => s+t.total_bytes, 0);
          this.toast('已分配 ' + r.count + ' 个 task');
        } else {
          this.toast('分配失败: ' + r.error);
        }
      });
    },
    qiCreateJob() {
      if (!this.qi.tasks.length) return;
      this.qi.creating = true;
      const tasks = this.qi.tasks.map(t => ({
        task_id: t.task_id,
        disk_path: this.qi.overrides[t.task_id] || t.disk_path,
        episodes: t.episodes?.split(',') || [],
      }));
      this.api('/api/v1/jobs', {method:'POST', body:{
        name: 'job_'+Date.now(),
        agent_id: parseInt(this.qi.agent_id),
        tasks: tasks,
        obs_source_id: this.obsSources[0]?.id || null,
      }}).then(r => {
        this.qi.creating = false;
        if (r.ok) {
          this.toast('作业已创建, ID: '+r.job_id);
          this.qi = { agent_id: this.qi.agent_id, task_text:'', tasks:[], total_eps:0, total_bytes:0, loading:false, creating:false, durations:{}, overrides:{}, preview_sheets:[], file_key:'', active_sheet:0, mappings:[], extracted:false };
          document.getElementById('importFile').value = '';
          this.page = 'jobs'; this.loadJobs();
        } else {
          this.toast('创建失败: '+r.error);
        }
      });
    },

    // Task Queue (任务队列)
    get pq_filtered() {
      if (!this.pq.status_filter) return this.pq.tasks;
      return this.pq.tasks.filter(t => t.status === this.pq.status_filter);
    },
    pqRefresh() { this.loadDashboard(); },
    loadPendingTasks() {
      this.api('/api/v1/tasks/pending').then(r => { if (r.ok) {
        this.pq.tasks = r.tasks;
        const groups = {};
        for (const t of r.tasks) {
          const key = t.batch_name || '未分组';
          if (!groups[key]) groups[key] = {name: key, tasks: [], open: key!=='未分组', pending:0, skipped:0};
          groups[key].tasks.push(t);
          if (t.status === 'pending') groups[key].pending++;
          if (t.status === 'skipped') groups[key].skipped++;
        }
        this.pq.batches = Object.values(groups).sort((a,b) => (a.name > b.name ? -1 : 1));
        this.al.pending_count = r.tasks.filter(t => t.status==='pending').length;
      }});
    },
    pqDeleteBatch(name) {
      if (!confirm('删除整组: ' + name + ' ?')) return;
      this.api('/api/v1/tasks/pending/batch/' + encodeURIComponent(name), {method:'DELETE'}).then(r => {
        if (r.ok) { this.toast('已删除'); this.loadPendingTasks(); }
      });
    },
    pqCreateJob(batch) {
      const pending = batch.tasks.filter(t => t.status === 'pending');
      if (!pending.length) return;
      const disk = document.getElementById('disk_' + batch.name)?.value;
      const jobName = document.getElementById('jobname_' + batch.name)?.value || ('job_' + batch.name.substring(0, 10) + '_' + pending.length);
      if (!disk) { this.toast('请选择磁盘'); return; }
      this.api('/api/v1/jobs', {method:'POST', body:{
        name: jobName, agent_id: pending[0].agent_id,
        tasks: pending.map(t => ({task_id: t.task_id, disk_path: disk, episodes: []})),
        obs_source_id: this.obsSources[0]?.id || null, start: false,
      }}).then(r => {
        if (r.ok) { this.toast('已创建作业 #'+r.job_id); this.loadPendingTasks(); }
        else { this.toast('创建失败: '+r.error); }
      });
    },
    pqRetry(id) {
      this.api('/api/v1/tasks/pending/retry', {method:'POST', body:{ids: [id]}}).then(r => {
        if (r.ok) { this.toast('已重置为待处理'); this.loadPendingTasks(); }
      });
    },
    pqDelete(id) {
      if (!confirm('确定删除?')) return;
      this.api('/api/v1/tasks/pending/'+id, {method:'DELETE'}).then(r => {
        if (r.ok) { this.loadPendingTasks(); }
      });
    },

    // Allocate (分配作业)
    alLoad() {
      if (!this.al.agent_id) { this.toast('请先选择机器'); return; }
      this.al.selected = []; this.al.plan = [];
      this.api('/api/v1/tasks/pending?agent_id=' + this.al.agent_id + '&status=pending').then(r => {
        if (r.ok) {
          this.al.all_tasks = r.tasks;
          this.al.pending_count = r.tasks.length;
        }
      });
    },
    alToggleAll(e) {
      this.al.selected = e.target.checked ? this.al.all_tasks.filter(t => !t.disk_path).map(t => t.id) : [];
    },
    alManualAssign() {
      if (!this.al.selected.length || !this.al.assign_disk) { this.toast('请选择任务和磁盘'); return; }
      const selected_ids = [...this.al.selected];
      const tasks = this.al.all_tasks.filter(t => this.al.selected.includes(t.id));
      const disk = this.selectedAgentDisks.find(d => d.path === this.al.assign_disk);
      const limit_gb = (disk?.free_bytes || 0) * 0.95 / 1024 / 1024 / 1024;
      // Sort by size descending, greedily fit as many as possible
      tasks.sort((a,b) => (b.estimated_bytes||0) - (a.estimated_bytes||0));
      let used = 0;
      const fit = [];
      const over = [];
      for (const t of tasks) {
        const gb = (t.estimated_bytes || 0) / 1024 / 1024 / 1024;
        if (used + gb <= limit_gb) { used += gb; fit.push(t); }
        else { over.push(t); }
      }
      if (!fit.length) { this.toast('磁盘容量不足'); return; }

      this.api('/api/v1/tasks/pending/assign', {method:'POST', body:{
        ids: fit.map(t => t.id), disk_path: this.al.assign_disk,
      }}).then(r => {
        if (r.ok) {
          this.api('/api/v1/jobs', {method:'POST', body:{
            name: 'job_'+Date.now(), agent_id: parseInt(this.al.agent_id),
            tasks: fit.map(t => ({task_id: t.task_id, disk_path: this.al.assign_disk, episodes: []})),
            obs_source_id: this.obsSources[0]?.id || null, start: false,
          }}).then(r2 => {
            if (r2.ok) {
              let msg = '已创建作业 #'+r2.job_id + ' (分配 '+fit.length+' 个task, '+used.toFixed(0)+'GB, 剩余 '+(limit_gb-used).toFixed(0)+'GB)';
              if (over.length) msg += ', ' + over.length + ' 个超出容量留在队列';
              this.toast(msg);
              this.al.all_tasks = this.al.all_tasks.filter(t => !fit.find(f => f.id === t.id));
              this.al.selected = []; this.al.assign_disk = '';
            } else { this.toast('创建失败: '+r2.error); }
          });
        }
      });
    },
    alPreview() {
      if (!this.al.agent_id) { this.toast('请先选择机器'); return; }
      this.al.loading = true; this.al.plan = []; this.al.unassigned_tasks = [];
      this.api('/api/v1/tasks/allocate-preview', {method:'POST', body:{agent_id: parseInt(this.al.agent_id)}}).then(r => {
        this.al.loading = false;
        if (r.ok) {
          this.al.plan = r.plan;
          this.al.unassigned = r.unassigned;
          this.al.pending_count = r.total_tasks;
          // Collect unassigned tasks from plan
          const assigned = new Set();
          r.plan.forEach(p => p.tasks.forEach(t => assigned.add(t.task_id)));
          this.al.unassigned_tasks = this.al.all_tasks.filter(t => !assigned.has(t.task_id)).map(t => ({
            task_id: t.task_id, episode_count: t.episode_count, size_gb: (t.estimated_bytes/1024/1024/1024).toFixed(2)
          }));
        } else { this.toast(r.error); }
      });
    },

    get selectedAgentDisks() {
      const aid = this.qi.agent_id || this.al.agent_id;
      const a = this.agents.find(x => x.id == aid);
      return a ? a.disks : [];
    },
    get diskWarning() {
      const warns = [];
      for (const d of this.selectedAgentDisks) {
        if (d.total_bytes > 0) {
          const pct = (d.total_bytes - d.free_bytes) / d.total_bytes * 100;
          const free_gb = d.free_bytes / 1024 / 1024 / 1024;
          if (pct > 95) {
            warns.push(d.label + ' 仅剩 ' + free_gb.toFixed(1) + 'GB (' + pct.toFixed(0) + '% 已用)');
          } else if (pct > 85) {
            warns.push(d.label + ' 剩余 ' + free_gb.toFixed(1) + 'GB (' + pct.toFixed(0) + '% 已用)');
          }
        }
      }
      return warns.join('; ');
    },

    loadMonitor() {
      this.api('/api/v1/monitor').then(r => {
        if (r.ok) {
          let completed = 0, failed = 0, total = 0, speed = 0, tasks_count = 0;
          r.jobs.forEach(j => {
            if (j.status === 'running' || j.status === 'completed' || j.status === 'partial') {
              completed += (j.agent_completed || 0);
              failed += (j.agent_failed || 0);
              total += (j.agent_total || j.total_episodes || 0);
              speed += (j.agent_speed || 0);
              tasks_count++;
            }
          });
          this.mon.total_tasks = tasks_count;
          this.mon.total_files = total;
          this.mon.completed = completed;
          this.mon.failed = failed;
          this.mon.speed = speed;
          const remaining = total - completed - failed;
          this.mon.eta = speed > 0 ? remaining / speed : 0;
          if (this.mon.eta > 0) {
            const h = Math.floor(this.mon.eta / 3600);
            this.mon.eta_text = h > 0 ? h+'h '+Math.floor(this.mon.eta%3600/60)+'m' : Math.floor(this.mon.eta/60)+'m'+Math.floor(this.mon.eta%60)+'s';
          } else {
            this.mon.eta_text = '--';
          }
          this.mon.disks = r.disks;
        }
      });
    },

    _watch: null,
  };
}
</script>
